<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSentinel SOC</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="logo">🛡️ CyberSentinel</div>
    <span class="status-dot" id="statusDot"></span>
  </header>

  <section class="stats-grid" id="statsGrid">
    <div class="stat-card critical">
      <span class="stat-value" id="criticalAlerts">—</span>
      <span class="stat-label">Critical</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="threatsToday">—</span>
      <span class="stat-label">Threats Today</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="blockedDomains">—</span>
      <span class="stat-label">Risky Domains</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="maliciousDownloads">—</span>
      <span class="stat-label">Bad Downloads</span>
    </div>
  </section>

  <section class="section">
    <h2>Recent Alerts</h2>
    <div id="alertsList" class="alerts-list"></div>
  </section>

  <section class="section">
    <h2>Threat Hunt</h2>
    <div class="hunt-bar">
      <input type="text" id="huntInput" placeholder="show phishing alerts" />
      <button id="huntBtn">Search</button>
    </div>
    <div id="huntResults" class="hunt-results"></div>
  </section>

  <footer class="footer">
    <button id="openDashboard">Open SOC Dashboard</button>
    <button id="openSettings" class="secondary">Settings</button>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
