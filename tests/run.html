<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSentinel Tests</title>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid #30363d;
      padding-bottom: 16px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      color: #58a6ff;
    }
    .stats {
      font-size: 14px;
      font-weight: 600;
    }
    .pass-count { color: #3fb950; }
    .fail-count { color: #f85149; }
    .test-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .test-item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .test-item.pass {
      border-left: 4px solid #3fb950;
    }
    .test-item.fail {
      border-left: 4px solid #f85149;
    }
    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .test-name {
      font-weight: 600;
      font-size: 16px;
    }
    .test-status {
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .pass .test-status {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
    }
    .fail .test-status {
      background: rgba(248, 81, 73, 0.15);
      color: #f85149;
    }
    .test-error {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #ff7b72;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      margin-top: 4px;
    }
  </style>
  <script>
    // Mock the chrome extension APIs before test scripts run
    const mockStorage = {
      cybersentinel_config: {
        splunk: { enabled: false },
        alerts: { browserPopup: false },
        detection: {
          phishingEnabled: true,
          scriptAnalysisEnabled: true,
          formMonitoringEnabled: true,
          threatIntelEnabled: true,
          monitoringScope: 'all',
          allowlistDomains: [],
          blocklistDomains: []
        }
      },
      cybersentinel_events: [],
      cybersentinel_alerts: [],
      cybersentinel_iocs: [],
      cybersentinel_threat_cache: { urls: {}, domains: {}, ips: {}, feeds: {}, lastUpdated: null }
    };

    const stubListener = {
      addListener: () => {},
      removeListener: () => {}
    };

    globalThis.chrome = {
      storage: {
        local: {
          get: async (keys) => {
            if (typeof keys === 'string') {
              return { [keys]: mockStorage[keys] };
            }
            if (Array.isArray(keys)) {
              const res = {};
              for (const k of keys) res[k] = mockStorage[k];
              return res;
            }
            return { ...mockStorage };
          },
          set: async (items) => {
            Object.assign(mockStorage, items);
          }
        }
      },
      runtime: {
        getURL: (path) => path,
        onMessage: stubListener,
        onInstalled: stubListener,
        onStartup: stubListener
      },
      webNavigation: {
        onCommitted: stubListener,
        onBeforeNavigate: stubListener
      },
      tabs: {
        onCreated: stubListener,
        onRemoved: stubListener,
        get: async () => ({})
      },
      downloads: {
        onCreated: stubListener,
        onChanged: stubListener
      },
      permissions: {
        contains: (opts, cb) => cb(true)
      },
      management: {
        onInstalled: stubListener,
        onEnabled: stubListener,
        onDisabled: stubListener
      },
      alarms: {
        create: () => {},
        onAlarm: stubListener
      }
    };

    globalThis.fetch = async (url) => {
      const value = String(url);

      if (value.includes('dns.google')) {
        return {
          ok: true,
          status: 200,
          json: async () => ({ Answer: [{ type: 1, data: '203.0.113.10' }] })
        };
      }

      if (value.includes('openphish.com')) {
        return {
          ok: true,
          status: 200,
          text: async () => 'https://test-phish.xyz/login\n'
        };
      }

      if (value.includes('phishtank.com')) {
        return {
          ok: true,
          status: 200,
          json: async () => [{ url: 'https://phishtank-example.test/login' }]
        };
      }

      if (value.includes('urlhaus.abuse.ch')) {
        return {
          ok: true,
          status: 200,
          text: async () => '# urlhaus\n"1","2026-01-01 00:00:00","https://malware-example.test/payload.exe","online","threat"\n'
        };
      }

      return {
        ok: true,
        status: 200,
        text: async () => '',
        json: async () => ({})
      };
    };
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>CyberSentinel Test Runner</h1>
      <div class="stats" id="stats">
        Running tests...
      </div>
    </header>
    <ul class="test-list" id="testList"></ul>
  </div>

  <script type="module" src="suite.js"></script>
</body>
</html>
